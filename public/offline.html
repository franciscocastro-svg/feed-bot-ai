<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ec4899" />
    <title>NewsFlow offline</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #09090d;
        color: #f7f4fb;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(460px, 100%);
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 14px;
        background: #151119;
        padding: 24px;
        box-shadow: 0 24px 70px rgba(0,0,0,.34);
      }
      img { width: 44px; height: 44px; border-radius: 12px; }
      h1 { margin: 18px 0 8px; font-size: 24px; line-height: 1.15; }
      p { margin: 0; color: #b8afc1; line-height: 1.5; }
      button {
        margin-top: 18px;
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 12px 16px;
        background: #ec4899;
        color: #fff;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon-192.png" alt="" />
      <h1>Você está offline</h1>
      <p>O NewsFlow precisa de conexão para sincronizar Supabase, Instagram e publicações. Assim que a internet voltar, atualize a tela.</p>
      <button type="button" onclick="window.location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
